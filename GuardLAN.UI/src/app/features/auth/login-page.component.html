<section class="login-shell">
  <form class="login-panel" (ngSubmit)="login()">
    <div class="brand-row">
      <span class="brand-mark">GL</span>
      <div>
        <p class="eyebrow">GuardLAN</p>
        <h1>Sign in</h1>
      </div>
    </div>

    <label>
      <span>Username</span>
      <input
        autocomplete="username"
        name="username"
        required
        type="text"
        [(ngModel)]="username"
      />
    </label>

    <label>
      <span>Password</span>
      <input
        autocomplete="current-password"
        name="password"
        required
        type="password"
        [(ngModel)]="password"
      />
    </label>

    @if (auth.error(); as message) {
      <p class="error-message" role="alert">{{ message }}</p>
    }

    <button type="submit" [disabled]="auth.loggingIn()">
      {{ auth.loggingIn() ? 'Signing in...' : 'Sign in' }}
    </button>
  </form>
</section>
