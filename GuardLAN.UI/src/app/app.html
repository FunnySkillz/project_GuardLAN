<div class="app-shell">
  <aside class="sidebar" aria-label="Primary">
    <div class="brand">
      <span class="brand-mark">GL</span>
      <span class="brand-name">GuardLAN</span>
    </div>

    <nav class="nav-list">
      <a
        class="nav-link"
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        ariaCurrentWhenActive="page"
      >
        Dashboard
      </a>
      <a class="nav-link" routerLink="/devices" routerLinkActive="active" ariaCurrentWhenActive="page">
        Devices
      </a>
      <span class="nav-link disabled">Connections</span>
      <span class="nav-link disabled">DNS</span>
      <a class="nav-link" routerLink="/alerts" routerLinkActive="active" ariaCurrentWhenActive="page">
        Alerts
      </a>
      <span class="nav-link disabled">Settings</span>
    </nav>
  </aside>

  <main class="workspace">
    <router-outlet />
  </main>
</div>
